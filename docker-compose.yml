services:
  wuying-crawler:
    build: .
    container_name: wuying-crawler
    restart: unless-stopped
    expose:
      - "8000"
    environment:
      SCRAPER_API_KEY: ${SCRAPER_API_KEY}
      CRAWLER_CALLBACK_URL: ${CRAWLER_CALLBACK_URL}
      CRAWLER_CALLBACK_API_KEY: ${CRAWLER_CALLBACK_API_KEY}
      CRAWLER_RECORD_TIMEOUT_SECONDS: ${CRAWLER_RECORD_TIMEOUT_SECONDS:-180}
      CRAWLER_BATCH_TIMEOUT_SECONDS: ${CRAWLER_BATCH_TIMEOUT_SECONDS:-3600}
      CRAWLER_BATCH_MAX_WORKERS: ${CRAWLER_BATCH_MAX_WORKERS:-5}
      BATCH_OUTPUT_DIR: ${BATCH_OUTPUT_DIR:-data/batches}
      WUYING_MANUAL_ADB_ENDPOINT: ${WUYING_MANUAL_ADB_ENDPOINT}
      WUYING_INSTANCE_IDS: ${WUYING_INSTANCE_IDS}
      WUYING_START_ADB_VIA_API: ${WUYING_START_ADB_VIA_API:-false}
      WUYING_REGION_ID: ${WUYING_REGION_ID:-cn-shanghai}
      WUYING_ENDPOINT: ${WUYING_ENDPOINT:-}
      WUYING_KEY_PAIR_ID: ${WUYING_KEY_PAIR_ID:-}
      WUYING_AUTO_ATTACH_KEY_PAIR: ${WUYING_AUTO_ATTACH_KEY_PAIR:-false}
      ALIBABA_CLOUD_ACCESS_KEY_ID: ${ALIBABA_CLOUD_ACCESS_KEY_ID:-}
      ALIBABA_CLOUD_ACCESS_KEY_SECRET: ${ALIBABA_CLOUD_ACCESS_KEY_SECRET:-}
      ADB_PATH: /usr/bin/adb
      ADB_VENDOR_KEYS: ${ADB_VENDOR_KEYS:-/app/platform-tools/adbkey}
      DEVICE_POOL_FILE: ${DEVICE_POOL_FILE:-config/device_pool.json}
      DEVICE_LEASE_DIR: ${DEVICE_LEASE_DIR:-.runtime/device_leases}
      DEVICE_LEASE_TTL_SECONDS: ${DEVICE_LEASE_TTL_SECONDS:-7200}
    volumes:
      - ./data:/app/data
      - ./platform-tools:/app/platform-tools
    networks:
      wuying-internal: {}
      wuying-crawler-shared:
        aliases:
          - ${WUYING_CRAWLER_ALIAS:-wuying-crawler}

networks:
  wuying-internal:
    driver: bridge

  wuying-crawler-shared:
    external: true
    name: ${WUYING_SHARED_NETWORK:-wuying-crawler-shared}
